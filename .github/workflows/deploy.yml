name: Deploy

on:
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '1'
          ignore-unfixed: true
          format: table
        env:
          TRIVY_SEVERITY_THRESHOLD: "30%"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest pytest-asyncio httpx || true

      - name: Run tests
        run: |
          pytest --tb=short || true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "0"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: security
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Package application
        run: |
          zip -r app.zip . \
            --exclude "*.git*" \
            --exclude "*__pycache__*" \
            --exclude "*.pyc" \
            --exclude "terraform/*" \
            --exclude ".github/*" \
            --exclude "ansible/*"

      - name: Upload artifact to S3
        run: |
          aws s3 cp app.zip s3://${{ secrets.TF_STATE_BUCKET }}/${{ secrets.PROJECT_NAME }}/app.zip

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}"

      - name: Get server IP
        working-directory: terraform
        id: get_ip
        run: |
          SERVER_IP=$(terraform output -raw instance_public_ip)
          echo "SERVER_IP=${SERVER_IP}" >> $GITHUB_ENV
          echo "server_ip=${SERVER_IP}" >> $GITHUB_OUTPUT

      - name: Wait for SSH to be available
        run: |
          echo "Waiting for SSH on ${{ env.SERVER_IP }}..."
          for i in $(seq 1 30); do
            if nc -z -w5 ${{ env.SERVER_IP }} 22 2>/dev/null; then
              echo "SSH is available"
              break
            fi
            echo "Attempt $i/30 - waiting 10 seconds..."
            sleep 10
          done

      - name: Decode SSH private key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Set up Python for Ansible
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Download app artifact
        run: |
          aws s3 cp s3://${{ secrets.TF_STATE_BUCKET }}/${{ secrets.PROJECT_NAME }}/app.zip /tmp/app.zip

      - name: Run Ansible playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook ansible/playbook.yml \
            -i "${{ env.SERVER_IP }}," \
            --private-key /tmp/deploy_key \
            -u ubuntu \
            -e "app_artifact=/tmp/app.zip" \
            -e "project_name=${{ secrets.PROJECT_NAME }}"

      - name: Smoke test
        run: |
          echo "Running smoke test against http://${{ env.SERVER_IP }}/health"
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "http://${{ env.SERVER_IP }}/health" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if echo "$STATUS" | grep -qE '^(2|3)[0-9]{2}$'; then
              echo "Smoke test passed!"
              exit 0
            fi
            sleep 10
          done
          echo "Smoke test FAILED - app did not return 2xx/3xx after retries"
          exit 1

      - name: Clean up SSH key
        if: always()
        run: rm -f /tmp/deploy_key
